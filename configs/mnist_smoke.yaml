run_name: mnist_smoke
batch_size: 64
max_steps: 200
learning_rate: 0.0005
weight_decay: 0.0001
num_workers: 0
log_interval: 10
checkpoint_interval: 50
sample_interval: 50
runs_dir: runs
dataset:
  name: mnist
  split: train
  cache_dir: data/hf
  limit: 5000
  seed: 17
model:
  d_model: 128
  workspace_latents: 32
  hierarchy_depth: 2
  contexts: 6
  definitions_per_context: 12
  image_channels: 1
  image_size: 28
  patch_size: 4
  attention_heads: 4
  inference_steps: 2
  recon_weight: 1.0
  pred_weight: 1.0
  free_energy_weight: 0.03
  complexity_weight: 0.01
  context_entropy_weight: 0.001
  context_balance_weight: 0.01
  ternary_activation_weight: 0.001
  bit_cost_weight: 0.0005
  use_ternary_conditioning: true
  ternary_condition_scale: 0.25
