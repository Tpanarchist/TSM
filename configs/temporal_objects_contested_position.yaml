run_name: temporal_objects_contested_position
batch_size: 64
max_steps: 300
learning_rate: 0.0008
weight_decay: 0.0001
num_workers: 0
log_interval: 10
checkpoint_interval: 50
sample_interval: 50
runs_dir: runs
dataset:
  name: temporal_objects_contested_position
  split: train
  cache_dir: data/hf
  limit: 2560
  seed: 41
model:
  d_model: 96
  workspace_latents: 24
  hierarchy_depth: 2
  contexts: 4
  definitions_per_context: 12
  image_channels: 1
  image_size: 28
  patch_size: 4
  attention_heads: 4
  inference_steps: 2
  use_patch_position_features: true
  patch_position_scale: 0.1
  use_position_aware_definition_read: true
  definition_position_feature_scale: 1.0
  recon_weight: 1.0
  pred_weight: 1.0
  free_energy_weight: 0.03
  complexity_weight: 0.01
  context_entropy_weight: 0.001
  context_balance_weight: 0.02
  ternary_activation_weight: 0.001
  bit_cost_weight: 0.0005
  use_ternary_conditioning: true
  ternary_condition_scale: 0.25
  use_memory_conditioning: true
  memory_condition_scale: 0.2
  memory_definition_scale: 0.75
  reappearance_alignment_weight: 0.0
  reappearance_alignment_temperature: 0.25
  object_cycle_weight: 0.01
  object_cycle_temperature: 0.25
  object_cycle_pair_weight: 0.25
  object_cycle_file_weight: 0.25
  reappearance_file_query_weight: 0.0
  reappearance_file_query_temperature: 0.25
  reappearance_file_query_hard_weight: 1.0
  active_file_query_weight: 0.002
  active_file_query_temperature: 0.25
  active_file_expectation_weight: 0.003
  active_file_expectation_temperature: 0.25
  active_file_expectation_hard_weight: 1.0
  active_file_expectation_detach_inputs: true
  active_file_expectation_trajectory_features: true
  active_file_expectation_dynamics_features: true
  active_file_expectation_phase_count: 5
  active_file_dynamics_weight: 0.01
  active_file_dynamics_detach_inputs: true
  active_file_dynamics_delta_scale: 0.5
  active_file_candidate_radius: 8.1
  active_file_candidate_max_age: 8.0
  active_file_candidate_wrap: true
  learned_active_file_gate_weight: 0.02
  learned_active_file_gate_topk: 10
  learned_active_file_gate_threshold: 0.5
  learned_active_file_gate_detach_inputs: true
  learned_active_file_gate_context_features: true
  learned_active_file_gate_expectation_features: true
  object_slot_count: 2
  object_slot_sigma: 2.8
  object_slot_nms_radius: 5.0
  object_slot_salience_threshold: 0.05
  object_slot_match_radius: 4.0
  object_slot_ternary_diagnostics: true
